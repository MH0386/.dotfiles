name: CI
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
  checks: write
  deployments: write
  security-events: write
  actions: read
jobs:
  prek:
    name: prek
    runs-on: ubuntu-latest
    environment: prek
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: leafo/gh-actions-lua@v12.0.0
      - run: ls -lah .lua/bin
      - uses: leafo/gh-actions-luarocks@v6
      
      # Install some package
      - name: install a module
        run: luarocks install moonscript
      - name: Install lua-language-server
        uses: jaxxstorm/action-install-gh-release@v1.10.0
        with:
          repo: LuaLS/lua-language-server
          cache: enable
          binaries-location: bin
      - name: Run prek hooks
        uses: j178/prek-action@9d6a3097e0c1865ecce00cfb89fe80f2ee91b547 # v1.0.12
      - name: Commit prek changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        if: success() || failure()
        with:
          commit_message: "prek: Apply fixes"
          commit_options: --no-verify
